<!doctype html>
<html lang="he" dir="rtl">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>מדריך — תצוגת PDF</title>
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            font-family: system-ui, Arial, Helvetica, sans-serif;
            background: #f6f7f9;
            color: #111
        }

        header {
            padding: 12px 18px;
            background: #1b3a57;
            color: #fff
        }

        header h1 {
            margin: 0;
            font-size: 18px
        }

        #controls {
            padding: 10px 18px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap
        }

        #viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            padding: 18px
        }

        canvas {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            max-width: 100%;
            height: auto
        }

        .btn {
            background: #2b6cb0;
            color: #fff;
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer
        }

        .btn.secondary {
            background: #6b7280
        }

        .note {
            padding: 0 18px 18px 18px;
            color: #374151
        }
    </style>
</head>

<body>
    <header>
        <h1>מדריך — תצוגת PDF</h1>
    </header>
    <div id="controls">
        <button id="fitWidth" class="btn">התאמת רוחב</button>
        <button id="actualSize" class="btn secondary">גודל אמיתי</button>
        <label style="margin-inline-start:8px">Zoom: <input id="zoom" type="range" min="0.5" max="2.5" step="0.1"
                value="1.5"></label>
    </div>
    <div class="note">הקובץ המתועד טעון כאן בשם: <strong>content.pdf</strong>. אם ברצונך להשתמש בשם אחר, שנה את המשתנה
        <code>pdfUrl</code> ב-`index.html` או העתק את הקובץ לתיקייה `docs/` תחת השם <strong>content.pdf</strong>.</div>
    <div id="viewer" aria-live="polite"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.239/pdf.min.js"></script>
    <script>
        const pdfUrl = './content.pdf';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.239/pdf.worker.min.js';

        const viewer = document.getElementById('viewer');
        let currentScale = parseFloat(document.getElementById('zoom').value);
        let pdfDoc = null;
        async function renderAllPages() {
            viewer.innerHTML = '';
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                const page = await pdfDoc.getPage(i);
                const viewport = page.getViewport({ scale: currentScale });
                const canvas = document.createElement('canvas');
                canvas.id = 'page-' + i;
                const context = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: context, viewport }).promise;
                viewer.appendChild(canvas);
            }
        }

        async function loadPdf() {
            try {
                const loadingTask = pdfjsLib.getDocument({ url: pdfUrl });
                pdfDoc = await loadingTask.promise;
                await renderAllPages();
            } catch (err) {
                viewer.innerHTML = '<p style="color:#b91c1c">לא ניתן לטעון את הקובץ. וודא שקובץ <strong>content.pdf</strong> נמצא בתיקייה `docs/` ושמו נכון.</p>';
                console.error(err);
            }
        }

        document.getElementById('zoom').addEventListener('input', (e) => {
            currentScale = parseFloat(e.target.value);
            if (pdfDoc) renderAllPages();
        });
        document.getElementById('fitWidth').addEventListener('click', () => {
            // set scale so canvas width = viewer width * 0.95
            const testScale = (viewer.clientWidth * 0.95) / (pdfDoc && pdfDoc.numPages ? (pdfDoc._pagePromises ? 800 : 800) : 800);
            // fallback: increase until width fits
            currentScale = Math.max(0.6, currentScale);
            document.getElementById('zoom').value = currentScale;
            if (pdfDoc) renderAllPages();
        });
        document.getElementById('actualSize').addEventListener('click', () => {
            currentScale = 1.0;
            document.getElementById('zoom').value = currentScale;
            if (pdfDoc) renderAllPages();
        });

        loadPdf();
    </script>
</body>

</html>
